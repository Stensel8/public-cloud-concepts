# PDF Export - Exporteer alleen de uitwerkingen als PDF.
#
# Haalt elke uitwerking op van de live site, zodat links in de PDF
# verwijzen naar https://public-cloud-concepts.stensel.nl/ en niet naar localhost.
#
# Gebruikt Puppeteer (puppeteer-core + Chrome) zodat de pagina
# volledig geladen is voordat de PDF wordt aangemaakt (networkidle2).
#
# Resultaat: 7 PDF-bestanden + één gebundeld artifact.
# Starten via: GitHub Actions > "Export naar PDF" > Run workflow

name: Export naar PDF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build-pdf:
    name: "Week ${{ matrix.week }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        week: [1, 2, 3, 4, 5, 6, 7]
      # fail-fast: false zorgt ervoor dat als één week faalt, de rest gewoon doorgaat.
      # Zonder dit zou een falende week alle andere weken cancelen.
      fail-fast: false

    steps:

      # Installeer puppeteer-core in /tmp zodat het script (dat ook in /tmp staat)
      # de module kan vinden. Node zoekt node_modules relatief aan het script.
      # puppeteer-core downloadt geen extra Chromium — gebruikt de systeem-Chrome.
      - name: Installeer Puppeteer
        run: cd /tmp && npm install puppeteer-core

      # Schrijf het Puppeteer-script naar /tmp (zelfde map als node_modules).
      # Het script opent de pagina, wacht tot het netwerk stil is (networkidle2),
      # en exporteert dan de volledige pagina als A4-PDF met achtergrondkleuren.
      - name: Schrijf Puppeteer-script
        run: |
          cat > /tmp/pdf.js << 'EOF'
          const puppeteer = require('puppeteer-core');

          (async () => {
            const browser = await puppeteer.launch({
              // Gebruik de voorgeïnstalleerde Chrome op de runner.
              executablePath: '/usr/bin/google-chrome',
              args: ['--no-sandbox', '--disable-dev-shm-usage'],
            });

            const page = await browser.newPage();

            // networkidle2: wacht tot er max. 2 netwerkverzoeken actief zijn
            // gedurende 500ms — betrouwbaarder dan een vaste wachttijd.
            await page.goto(process.env.PDF_URL, {
              waitUntil: 'networkidle2',
              timeout: 30000,
            });

            await page.pdf({
              path: process.env.PDF_FILE,
              format: 'A4',
              // printBackground: true behoudt achtergrondkleuren en -afbeeldingen
              // van het Hextra-thema in de PDF.
              printBackground: true,
            });

            await browser.close();
            console.log('Aangemaakt:', process.env.PDF_FILE);
          })();
          EOF

      # Controleer eerst of de uitwerkingspagina bestaat (HTTP 200).
      # Als de pagina er niet is (bijv. week nog niet uitgewerkt), sla dan over.
      # Als de pagina wel bestaat, genereer de PDF via Puppeteer en
      # controleer daarna of het bestand niet leeg is (Puppeteer kan stil falen).
      - name: Genereer PDF voor week ${{ matrix.week }}
        env:
          PDF_URL: "https://public-cloud-concepts.stensel.nl/nl/docs/week-${{ matrix.week }}/uitwerking/"
          PDF_FILE: "pdfs/Week-${{ matrix.week }}-Uitwerking.pdf"
        run: |
          mkdir -p pdfs

          status=$(curl -s -o /dev/null -w "%{http_code}" "$PDF_URL")

          if [ "$status" != "200" ]; then
            echo "Geen uitwerking voor week ${{ matrix.week }} (HTTP ${status}), overgeslagen."
            exit 0
          fi

          node /tmp/pdf.js

          if [ ! -s "$PDF_FILE" ]; then
            echo "Fout: Puppeteer heeft geen geldig PDF-bestand aangemaakt."
            exit 1
          fi

      # Sla de gegenereerde PDF op als artifact zodat hij downloadbaar is vanuit GitHub Actions.
      - name: Upload week PDF
        uses: actions/upload-artifact@v7
        with:
          name: "Week-${{ matrix.week }}-Uitwerking"
          path: "pdfs/Week-${{ matrix.week }}-Uitwerking.pdf"
          retention-days: 30


  bundle:
    name: Bundel alle uitwerkingen
    runs-on: ubuntu-latest
    # Wacht tot alle week-jobs klaar zijn voordat we gaan bundelen.
    needs: build-pdf

    steps:

      # Download alle losse week-PDFs naar één map.
      # merge-multiple: true zet alle bestanden plat in de opgegeven map (geen submappen per artifact).
      - name: Download alle week-PDFs
        uses: actions/download-artifact@v8
        with:
          pattern: "Week-*-Uitwerking"
          path: pdfs
          merge-multiple: true

      # Upload alle PDFs samen als één artifact zodat je ze in één klik kunt downloaden.
      - name: Upload gebundeld artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-cloud-concepts-uitwerkingen
          path: pdfs/
          retention-days: 30
