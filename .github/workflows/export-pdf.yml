# PDF Export - Exporteer alleen de uitwerkingen als PDF voor inlevering.
#
# Haalt elke uitwerking op van de live site, zodat links in de PDF
# verwijzen naar https://public-cloud-concepts.stensel.nl/ en niet naar localhost.
#
# Resultaat: 7 PDF-bestanden + één gebundeld artifact (30 dagen).
# Starten via: GitHub Actions > "Export naar PDF" > Run workflow

name: Export naar PDF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build-pdf:
    name: "Week ${{ matrix.week }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        week: [1, 2, 3, 4, 5, 6, 7]

    steps:

      - name: Genereer PDF voor week ${{ matrix.week }}
        run: |
          mkdir -p pdfs
          week=${{ matrix.week }}
          url="https://public-cloud-concepts.stensel.nl/nl/docs/week-${week}/uitwerking/"
          file="pdfs/Week-${week}-Uitwerking.pdf"

          status=$(curl -s -o /dev/null -w "%{http_code}" "$url")

          if [ "$status" = "200" ]; then
            google-chrome \
              --headless \
              --disable-gpu \
              --no-sandbox \
              --disable-dev-shm-usage \
              --print-to-pdf="$file" \
              --print-to-pdf-no-header \
              "$url" 2>/dev/null

            echo "Aangemaakt: $file"
          else
            echo "Geen uitwerking voor week ${week} (HTTP ${status}), overgeslagen."
          fi

      - name: Upload week PDF
        uses: actions/upload-artifact@v7
        with:
          name: "Week-${{ matrix.week }}-Uitwerking"
          path: "pdfs/Week-${{ matrix.week }}-Uitwerking.pdf"
          retention-days: 30


  bundle:
    name: Bundel alle uitwerkingen
    runs-on: ubuntu-latest
    needs: build-pdf

    steps:

      - name: Download alle week-PDFs
        uses: actions/download-artifact@v4
        with:
          pattern: "Week-*-Uitwerking"
          path: pdfs
          merge-multiple: true

      - name: Upload gebundeld artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-cloud-concepts-uitwerkingen
          path: pdfs/
          retention-days: 30
