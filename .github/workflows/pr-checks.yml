# Kwaliteitschecks die draaien op elke pull request naar main of development.
#
# Jobs:
#   pr-title        - Controleert of de PR-titel voldoet aan Conventional Commits
#                     (feat, fix, docs, chore, refactor, style, revert, ci).
#   image-format    - Weigert PNG/JPG-afbeeldingen in de docs-map en plaatst
#                     een PR-comment met conversieinstructies als ze worden gevonden.
#   dockerfile-lint - Lint de Dockerfile met hadolint.
name: PR Checks

on:
  pull_request:
    branches: [main, development]

permissions:
  contents: read

jobs:
  pr-title:
    name: Semantic PR title
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
    steps:
      # Controleer of de PR-titel het Conventional Commits-formaat volgt.
      # Toegestane types: feat, fix, docs, chore, refactor, style, revert, ci.
      # Een PR die begint met "WIP" wordt ook goedgekeurd (wip: true).
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          wip: true
          types: |
            feat
            fix
            docs
            chore
            refactor
            style
            revert
            ci

  image-format:
    name: Do not use JPG or PNG
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Haal de broncode op zodat we de bestanden kunnen controleren.
      - uses: actions/checkout@v6

      # Zoek alle PNG/JPG/JPEG-bestanden in de docs-map.
      # Sla het resultaat op als step-output: een lijst van bestanden en een boolean (found).
      - name: Find non-AVIF images
        id: check
        run: |
          {
            echo "files<<EOF"
            find "static/docs" \
              -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          count=$(find "static/docs" \
            -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "All images are AVIF."
          fi

      # Als er niet-AVIF afbeeldingen gevonden zijn: plaats een PR-comment
      # met de lijst van bestanden en instructies om ze te converteren naar AVIF.
      - name: Post PR comment
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          FILES: ${{ steps.check.outputs.files }}
          ACTOR: ${{ github.event.pull_request.user.login }}
        with:
          script: |
            const files = process.env.FILES.trim().split('\n').map(f => `- \`${f}\``).join('\n');
            const actor = process.env.ACTOR;
            const body = [
              `Hey @${actor}, je hebt nog afbeeldingen die geen AVIF zijn!`,
              '',
              'De volgende bestanden in `Uitwerking/` moeten geconverteerd worden:',
              files,
              '',
              'Installeer `avifenc`:',
              '```bash',
              'sudo pacman -S libavif',
              '```',
              '',
              'Batch-converteer alle afbeeldingen (recursief):',
              '```bash',
              'find . -type f \\( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \\) | while read -r f; do',
              '  avifenc -q 80 -s 6 "$f" "${f%.*}.avif" && rm "$f"',
              'done',
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      # Markeer elk gevonden bestand als fout in GitHub (annotatie) en laat de check falen.
      # Zo ziet de ontwikkelaar direct in de PR welke bestanden het probleem veroorzaken.
      - name: Annotate and fail
        if: steps.check.outputs.found == 'true'
        env:
          FILES: ${{ steps.check.outputs.files }}
        run: |
          while IFS= read -r f; do
            echo "::error file=$f::Converteer naar AVIF voor het mergen"
          done <<< "$FILES"
          exit 1

  dockerfile-lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      # Haal de broncode op.
      - uses: actions/checkout@v6

      # Download en installeer hadolint (Dockerfile linter).
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      # Voer de lint-controle uit op de Dockerfile.
      - name: Lint Dockerfile
        run: hadolint "static/docs/week-1/bestanden/Dockerfile"
