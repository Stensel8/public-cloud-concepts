name: Switch Blue-Green Slot

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Stuur verkeer naar welke versie?"
        required: true
        default: blue
        type: choice
        options:
          - blue
          - green

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  GAR_ZONE: europe-west4
  GAR_REPO: public-cloud-concepts
  IMAGE: app

jobs:
  switch:
    name: Switch naar ${{ inputs.slot }}
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Detect current active slot
        id: active
        run: |
          CURRENT_SLOT="$(kubectl get service public-cloud-concepts -o jsonpath='{.spec.selector.slot}' 2>/dev/null || echo none)"
          echo "current=${CURRENT_SLOT}" >> "$GITHUB_OUTPUT"

      - name: Update target deployment to latest slot image
        if: steps.active.outputs.current != inputs.slot
        run: |
          SLOT="${{ inputs.slot }}"
          IMAGE_TAG="${{ env.GAR_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${SLOT}"

          kubectl set image "deployment/deployment-${SLOT}" app="${IMAGE_TAG}"
          kubectl rollout restart "deployment/deployment-${SLOT}"
          kubectl rollout status "deployment/deployment-${SLOT}" --timeout=180s

      - name: Switch service naar ${{ inputs.slot }}
        if: steps.active.outputs.current != inputs.slot
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: public-cloud-concepts
          spec:
            type: LoadBalancer
            selector:
              app: public-cloud-concepts
              slot: ${{ inputs.slot }}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
          EOF

      - name: Controleer actieve slot
        run: |
          echo "Voor switch: ${{ steps.active.outputs.current }} | Gevraagd: ${{ inputs.slot }}"
          kubectl get service public-cloud-concepts -o jsonpath='{.spec.selector}'
          echo ""
          kubectl get pods -l app=public-cloud-concepts
