# Handmatige workflow om live verkeer te verplaatsen tussen de blue en green slot.
#
# Werking: past de selector van de Kubernetes Service aan zodat deze naar de
# gekozen slot wijst. Er worden geen nieuwe images gebouwd of gedeployd.
#
# BELANGRIJK: Beide deployments blijven draaien! Deze workflow wijzigt alleen
# welke deployment verkeer ontvangt via de LoadBalancer. De andere slot draait
# op de achtergrond door en kan gebruikt worden voor testing of als rollback.
#
# Voorbeeld scenario:
#   1. Blue (main) ontvangt verkeer, green (development) draait op de achtergrond
#   2. Je pushed nieuwe code naar development -> green wordt automatisch geüpdatet
#   3. Je test green via port-forward of tijdelijke service switch
#   4. Als alles werkt: run deze workflow met slot=green
#   5. Verkeer gaat nu naar green, blue blijft draaien (instant rollback mogelijk!)
#
# Secrets benodigd: GCP_SA_KEY, GKE_CLUSTER, GKE_ZONE
name: Switch Blue-Green Slot

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Stuur verkeer naar welke versie?"
        required: true
        default: blue
        type: choice
        options:
          - blue
          - green

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  switch:
    name: Switch naar ${{ inputs.slot }}
    runs-on: ubuntu-latest

    steps:
      - name: "Guard: run vanaf main branch"
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Gebruik deze workflow vanaf de 'main' branch voor een consistente switch-configuratie."
            echo "Huidige branch: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: "Guard: image-tag bestaat in Artifact Registry"
        run: |
          IMAGE="europe-west4-docker.pkg.dev/${{ env.PROJECT_ID }}/public-cloud-concepts/app:${{ inputs.slot }}"
          if ! gcloud artifacts docker images describe "$IMAGE" --location=europe-west4 >/dev/null 2>&1; then
            echo "Image tag niet gevonden: $IMAGE"
            echo "Run eerst CI Week 3 voor de bijbehorende branch (main=blue, development=green)."
            exit 1
          fi

      - name: "Guard: deployment van target-slot is healthy"
        run: |
          kubectl rollout status deployment/deployment-${{ inputs.slot }} --timeout=120s

      - name: Switch service naar ${{ inputs.slot }}
        run: |
          # kubectl apply maakt de service aan als die nog niet bestaat,
          # en werkt hem bij als die al bestaat - met de juiste slot-selector.
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: public-cloud-concepts
          spec:
            type: LoadBalancer
            selector:
              app: public-cloud-concepts
              slot: ${{ inputs.slot }}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
          EOF

      - name: Controleer actieve slot
        run: |
          echo "Verkeer wordt nu naar '${{ inputs.slot }}' gestuurd."
          kubectl get service public-cloud-concepts -o jsonpath='{.spec.selector}'
          echo ""
          kubectl get pods -l app=public-cloud-concepts
