# Week 3 - Handmatige Blue-Green slot-switch op het GKE-cluster.
#
# Gebruik: start deze workflow handmatig via GitHub Actions (workflow_dispatch)
# en kies welke slot (blue of green) het live verkeer moet ontvangen.
#
# Werking:
#   - De Kubernetes Service-selector wordt bijgewerkt naar de gekozen slot.
#   - Alleen pods met het bijbehorende label ontvangen daarna verkeer.
#   - Als het cluster niet beschikbaar is, wordt de workflow netjes geannuleerd.
#
# Secrets benodigd: GCP_PROJECT_ID, GCP_SA_KEY, GKE_CLUSTER, GKE_ZONE
name: Week 3 - Switch Blue-Green Slot

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Stuur verkeer naar welke slot?"
        required: true
        default: blue
        type: choice
        options:
          - blue
          - green

permissions:
  contents: read
  actions: write

# Omgevingsvariabelen die in meerdere stappen gebruikt worden.
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}

jobs:
  switch:
    name: Switch naar ${{ inputs.slot }}
    runs-on: ubuntu-latest

    steps:
      # Authenticeer bij Google Cloud met het service account.
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Controleer of het GKE-cluster beschikbaar is.
      # Als het cluster niet bestaat of niet bereikbaar is, slaat de workflow de
      # volgende stappen over en annuleert zichzelf (geen harde fout).
      - name: Check Week 3 cluster availability
        id: cluster_check
        run: |
          if gcloud container clusters describe "${{ env.GKE_CLUSTER }}" \
            --location "${{ env.GKE_ZONE }}" \
            --project "${{ env.PROJECT_ID }}" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Week 3 cluster gevonden; slot-switch wordt uitgevoerd." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Week 3 omgeving mogelijk niet beschikbaar. Dit kan normaal zijn (studentquota, 1 cluster tegelijk), of tijdelijk door GKE/Google Cloud/GitHub API bereikbaarheid."
            {
              echo "### Week 3 slot-switch overgeslagen"
              echo "Week 3 omgeving mogelijk niet beschikbaar."
              echo "Dit kan normaal zijn door studentquota (vaak maar 1 cluster tegelijk), of tijdelijk door GKE/Google Cloud/GitHub API bereikbaarheid."
              echo "De workflow is daarom bewust overgeslagen in plaats van hard gefaald."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Als het cluster niet beschikbaar is: annuleer de workflow via de GitHub API.
      # continue-on-error: true zorgt dat de annulering zelf geen extra fout geeft.
      - name: Mark run as cancelled when environment is unavailable
        if: steps.cluster_check.outputs.available != 'true'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            })

      # Haal de kubectl-configuratie op zodat we commando's naar het cluster kunnen sturen.
      - name: Get GKE credentials
        if: steps.cluster_check.outputs.available == 'true'
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      # Pas de Kubernetes Service aan zodat de selector wijst naar de gekozen slot.
      # Alleen pods met label slot=blue (of green) ontvangen daarna verkeer.
      # De Service-definitie wordt inline meegegeven via een heredoc (<<EOF).
      - name: Switch service naar ${{ inputs.slot }}
        if: steps.cluster_check.outputs.available == 'true'
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: public-cloud-concepts
          spec:
            type: LoadBalancer
            selector:
              app: public-cloud-concepts
              slot: ${{ inputs.slot }}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
          EOF

      # Laat zien welke slot nu actief is en welke pods momenteel draaien.
      - name: Controleer actieve slot
        if: steps.cluster_check.outputs.available == 'true'
        run: |
          kubectl get service public-cloud-concepts \
            -o jsonpath='Actieve slot: {.spec.selector.slot}{"\n"}'
          kubectl get pods -l app=public-cloud-concepts
