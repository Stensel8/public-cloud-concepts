# CI Week 3 - Blue-Green deployment naar Google Kubernetes Engine via Artifact Registry.
#
# Automatische deployment per branch:
#   main        -> bouwt en deployed slot "blue"  (productie)
#   development -> bouwt en deployed slot "green" (test)
#
# BELANGRIJK: Beide deployments draaien tegelijkertijd in het cluster!
# De development branch kan andere code bevatten dan main - ze hoeven niet
# gesynchroniseerd te zijn. Zo kun je nieuwe features testen op green voordat
# je ze merged naar main of live zet.
#
# Stappen:
#   1. Bepaal de slot op basis van de branch.
#   2. Authenticeer met GCP via het github-pipeline service account.
#   3. Configureer Docker voor Artifact Registry en haal GKE-credentials op.
#   4. Bouw het image en push het naar Artifact Registry met de juiste slot-tag.
#   5. Deploy naar GKE via envsubst + kubectl apply, forceer een rollout restart
#      en wacht op een succesvolle rollout (timeout 120s).
#
# Let op: de Kubernetes Service wordt hier NIET aangepast. De selector (blue/green)
# wordt beheerd via de switch-slot.yml workflow. Eenmalig aanmaken via kubectl apply.
#
# Secrets benodigd: GCP_PROJECT_ID, GCP_SA_KEY, GKE_CLUSTER, GKE_ZONE
name: CI Week 3 - Blue-Green Deploy

on:
  push:
    branches: [main, development]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  GAR_ZONE: europe-west4
  GAR_REPO: public-cloud-concepts
  IMAGE: app

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine deployment slot
        id: slot
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "slot=blue" >> $GITHUB_OUTPUT
          else
            echo "slot=green" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth print-access-token | docker login -u oauth2accesstoken \
            --password-stdin https://${{ env.GAR_ZONE }}-docker.pkg.dev

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Build Docker image
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          docker build \
            --build-arg SLOT="${SLOT}" \
            --tag "${{ env.GAR_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${SLOT}" \
            "./Week 1/Bestanden/"

      - name: Push to Artifact Registry
        run: |
          docker push "${{ env.GAR_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${{ steps.slot.outputs.slot }}"

      - name: Deploy to GKE
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"

          # IMAGE_TAG samenstellen uit de workflow-variabelen, zodat het exact overeenkomt
          # met het image dat hierboven gebouwd en gepusht is.
          export IMAGE_TAG="${{ env.GAR_ZONE }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${SLOT}"

          # envsubst vervangt ${IMAGE_TAG} in het YAML-bestand met de waarde hierboven.
          # Het resultaat wordt direct via stdin naar kubectl gestuurd (geen tijdelijk bestand nodig).
          envsubst < "Week 3/Bestanden/deployment-${SLOT}.yml" | kubectl apply -f -

          # Forceer een herstart zodat Kubernetes het nieuw gepushte image ophaalt.
          # Zonder dit herkent Kubernetes geen wijziging als de tag (bijv. :green) gelijk blijft.
          kubectl rollout restart deployment/deployment-${SLOT}

          # Wacht op succesvolle rollout; toon pod-details als het mislukt (helpt bij debuggen).
          if ! kubectl rollout status deployment/deployment-${SLOT} --timeout=120s; then
            echo "--- Rollout mislukt. Pod-status: ---"
            kubectl get pods -l slot=${SLOT} -o wide
            echo "--- Pod beschrijving: ---"
            kubectl describe pods -l slot=${SLOT}
            exit 1
          fi

          kubectl get pods -l slot=${SLOT}
