# CI Week 2 - Bouw en push twee Docker images naar Docker Hub.
#
# Stappen:
#   1. build - Bouwt en pusht de images voor de bison- en brightspace-applicaties.
#              Beide images worden altijd gepusht, ongeacht de branch.
#
# Secrets benodigd: DOCKER_USERNAME, DOCKER_PAT
name: CI Week 2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Build and push Docker images
        run: |
          docker build -t stensel8/public-cloud-concepts:bison "./static/docs/week-2/bestanden/bison"
          docker push stensel8/public-cloud-concepts:bison

          docker build -t stensel8/public-cloud-concepts:brightspace "./static/docs/week-2/bestanden/brightspace"
          docker push stensel8/public-cloud-concepts:brightspace
