# Hugo site deployment - Bouw de statische website en publiceer naar GitHub Pages.
#
# Stappen:
#   1. build  - Installeert Hugo, bouwt de site met minificatie en uploadt het resultaat.
#   2. deploy - Publiceert het gebouwde artifact naar GitHub Pages.
#
# Draait automatisch bij een push naar main, of handmatig via workflow_dispatch.
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Rechten die nodig zijn voor GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Zorg dat er nooit twee deployments tegelijk draaien.
# Een lopende deployment wordt NIET onderbroken door een nieuwe trigger.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.158.0
    steps:
      # Download en installeer de opgegeven versie van Hugo.
      # De "extended" variant is vereist voor SCSS/Sass-ondersteuning.
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # Haal de volledige git-geschiedenis op (fetch-depth: 0), zodat Hugo
      # de "last modified" datum per pagina correct kan bepalen.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Installeer Go, dat nodig is voor Hugo-modules (thema's en plugins).
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      # Sla gedownloade Hugo-modules op in de cache, zodat volgende runs sneller zijn.
      # De cache-sleutel is gebaseerd op go.sum; als dat bestand verandert, wordt de cache vernieuwd.
      - name: Cache Hugo modules
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      # Configureer GitHub Pages en sla de base-URL op voor gebruik tijdens het bouwen.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Bouw de Hugo-site:
      #   --gc        verwijdert ongebruikte cache-bestanden na het bouwen
      #   --minify    verkleint HTML/CSS/JS voor snellere laadtijden
      #   --baseURL   stelt de juiste URL in zodat interne links kloppen op GitHub Pages
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Amsterdam
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      # Upload de gebouwde site (map ./public) als artifact,
      # zodat het deploy-job het kan ophalen en publiceren.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Wacht tot het build-job klaar is voordat er gedeployed wordt.
    needs: build
    steps:
      # Publiceer het artifact naar GitHub Pages.
      # De URL van de gepubliceerde site wordt als output beschikbaar gesteld.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
