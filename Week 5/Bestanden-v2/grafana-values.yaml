replicas: 1
adminUser: sten
adminPassword: DLLrEfene@lwf3i23p_pyfP

ingress:
  enabled: true
  ingressClassName: nginx
  path: /
  pathType: Prefix
  hosts:
    - grafana.stijhuis.nl

persistence:
  type: pvc
  enabled: true
  storageClass: "standard-rwo"
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  finalizers:
    - kubernetes.io/pvc-protection
  inMemory:
    enabled: false

serviceAccount:
  create: true
  name: grafana-sa

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: loki
      type: loki
      orgId: 1
      url: http://loki.loki.svc.cluster.local:3100
      isDefault: false
    - name: prometheus
      orgId: 1
      type: prometheus
      url: http://prometheus-kube-prometheus-prometheus.prometheus:9090
      isDefault: true
