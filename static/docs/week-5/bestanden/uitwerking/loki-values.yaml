# Bronnen:
# - Officiële Grafana Loki SimpleScalable install docs:
#   https://grafana.com/docs/loki/latest/setup/install/helm/install-scalable/
# - Loki schema configuratie:
#   https://grafana.com/docs/loki/latest/operations/storage/schema/

deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 336h
  compactor:
    retention_enabled: true
    compaction_interval: 10m
    delete_request_store: filesystem
  ruler:
    enable_api: true

# Read path: query-frontend + querier
read:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# Write path: distributor + ingester (met WAL persistentie)
write:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    storageClass: standard-rwo
    size: 5Gi

# Backend: compactor + ruler + index-gateway
backend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  persistence:
    storageClass: standard-rwo
    size: 2Gi

# Memcached caches — zinvol in gedistribueerde (SimpleScalable) mode
# De grafana/loki chart schakelt deze standaard in; in SingleBinary zijn ze overbodig
chunksCache:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

resultsCache:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

# SingleBinary uitschakelen (vereist voor SimpleScalable)
singleBinary:
  replicas: 0

minio:
  enabled: false
