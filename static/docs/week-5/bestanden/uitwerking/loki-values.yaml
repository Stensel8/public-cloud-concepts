# Bronnen:
# - Officiële Grafana Loki SingleBinary install docs:
#   https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
# - Loki schema configuratie:
#   https://grafana.com/docs/loki/latest/operations/storage/schema/

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 336h
  compactor:
    retention_enabled: true
    compaction_interval: 10m
    delete_request_store: filesystem
  ruler:
    enable_api: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    storageClass: standard-rwo
    size: 5Gi

# SimpleScalable components uitgeschakeld
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Caches alleen zinvol in gedistribueerde mode
chunksCache:
  enabled: false
resultsCache:
  enabled: false

minio:
  enabled: false
