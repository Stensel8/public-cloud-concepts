alertmanager:
  enabled: false

# Grafana wordt hier gebundeld met kube-prometheus-stack in plaats van als
# losse Helm release (grafana/grafana chart is deprecated).
# De Prometheus datasource wordt automatisch geconfigureerd door de stack.
grafana:
  enabled: true

  adminUser: sten
  adminPassword: DLLrEfene@lwf3i23p_pyfP

  ingress:
    enabled: true
    ingressClassName: nginx
    path: /
    pathType: Prefix
    hosts:
      - grafana.stijhuis.nl

  persistence:
    type: pvc
    enabled: true
    storageClass: "standard-rwo"
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    finalizers:
      - kubernetes.io/pvc-protection

  serviceAccount:
    create: true
    name: grafana-sa

  # Geef Grafana meer tijd voor eerste opstart/migraties om probe-flapping te voorkomen.
  startupProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36

  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12

  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

  # Loki toevoegen als extra datasource; Prometheus wordt automatisch toegevoegd
  additionalDataSources:
    - name: loki
      type: loki
      orgId: 1
      url: http://loki-gateway.loki.svc.cluster.local
      isDefault: false

kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false

prometheus:
  enabled: true

  serviceAccount:
    create: true
    name: "prometheus-sa"

  ingress:
    enabled: false

  prometheusSpec:
    scrapeInterval: 10s
    evaluationInterval: 30s
    retention: 4d
    replicas: 1
    shards: 1

    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

cleanPrometheusOperatorObjectNames: true
