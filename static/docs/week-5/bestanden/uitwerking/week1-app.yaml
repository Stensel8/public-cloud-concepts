# =============================================================================
# Kubernetes manifests voor de week 1 applicatie (statische website)
# Namespace: week1-app
# Ingress: week1.stijhuis.nl (pas aan naar jouw domein)
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: week1-app

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: week1-app
  namespace: week1-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: week1-app
  template:
    metadata:
      labels:
        app: week1-app
    spec:
      containers:
        - name: week1-app
          image: stensel8/public-cloud-concepts:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi

---

apiVersion: v1
kind: Service
metadata:
  name: week1-app
  namespace: week1-app
spec:
  selector:
    app: week1-app
  ports:
    - port: 80
      targetPort: 80

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: week1-app
  namespace: week1-app
spec:
  ingressClassName: nginx
  rules:
    - host: week1.stijhuis.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: week1-app
                port:
                  number: 80
