htgrey;}#graph-2 .arrowheadPath{fill:lightgrey;}#graph-2 .edgePath .path{stroke:lightgrey;stroke-width:1px;}#graph-2 .flowchart-link{stroke:lightgrey;fill:none;}#graph-2 .edgeLabel{background-color:hsl(0, 0%, 34.4117647059%);text-align:center;}#graph-2 .edgeLabel p{background-color:hsl(0, 0%, 34.4117647059%);}#graph-2 .edgeLabel rect{opacity:0.5;background-color:hsl(0, 0%, 34.4117647059%);fill:hsl(0, 0%, 34.4117647059%);}#graph-2 .labelBkg{background-color:rgba(87.75, 87.75, 87.75, 0.5);}#graph-2 .cluster rect{fill:hsl(180, 1.5873015873%, 28.3529411765%);stroke:rgba(255, 255, 255, 0.25);stroke-width:1px;}#graph-2 .cluster text{fill:#F9FFFE;}#graph-2 .cluster span{color:#F9FFFE;}#graph-2 div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:12px;background:hsl(20, 1.5873015873%, 12.3529411765%);border:1px solid rgba(255, 255, 255, 0.25);border-radius:2px;pointer-events:none;z-index:100;}#graph-2 .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#ccc;}#graph-2 rect.text{fill:none;stroke-width:0;}#graph-2 .icon-shape,#graph-2 .image-shape{background-color:hsl(0, 0%, 34.4117647059%);text-align:center;}#graph-2 .icon-shape p,#graph-2 .image-shape p{background-color:hsl(0, 0%, 34.4117647059%);padding:2px;}#graph-2 .icon-shape .label rect,#graph-2 .image-shape .label rect{opacity:0.5;background-color:hsl(0, 0%, 34.4117647059%);fill:hsl(0, 0%, 34.4117647059%);}#graph-2 .label-icon{display:inline-block;height:1em;overflow:visible;vertical-align:-0.125em;}#graph-2 .node .label-icon path{fill:currentColor;stroke:revert;stroke-width:revert;}#graph-2 .node .neo-node{stroke:#ccc;}#graph-2 [data-look="neo"].node rect,#graph-2 [data-look="neo"].cluster rect,#graph-2 [data-look="neo"].node polygon{stroke:url(#graph-2-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#graph-2 [data-look="neo"].node path{stroke:url(#graph-2-gradient);stroke-width:1px;}#graph-2 [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#graph-2 [data-look="neo"].node .neo-line path{stroke:#ccc;filter:none;}#graph-2 [data-look="neo"].node circle{stroke:url(#graph-2-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#graph-2 [data-look="neo"].node circle .state-start{fill:#000000;}#graph-2 [data-look="neo"].icon-shape .icon{fill:url(#graph-2-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#graph-2 [data-look="neo"].icon-shape .icon-neo path{stroke:url(#graph-2-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#graph-2 :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g><marker id="graph-2_flowchart-v2-pointEnd" class="marker flowchart-v2" viewBox="0 0 10 10" refX="5" refY="5" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" class="arrowMarkerPath" style="stroke-width: 1; stroke-dasharray: 1, 0;"></path></marker>... (content truncated for brevity) ...</svg>
