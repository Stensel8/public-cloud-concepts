server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Stuur geen cache-headers mee voor HTML, zodat de browser bij elke
        # request de actuele versie ophaalt. Dit is nodig voor Blue-Green:
        # na een slot-switch moet ik de wijzigingen direct kunnen zien.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
