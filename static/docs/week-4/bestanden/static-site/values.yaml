# Default values voor de static-site Helm chart.
# Dit deployt het Docker image van week 1 en 2: stensel8/public-cloud-concepts

replicaCount: 2

# Het eigen Docker image gebouwd vanuit de Week 1 Dockerfile en gepusht via GitHub Actions.
image:
  repository: stensel8/public-cloud-concepts
  pullPolicy: IfNotPresent
  # Lege tag betekent dat appVersion uit Chart.yaml wordt gebruikt — overschrijf met "latest" indien gewenst.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
